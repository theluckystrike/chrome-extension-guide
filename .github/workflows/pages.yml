name: Build and Deploy Jekyll Site to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install dependencies
        run: |
          bundle install

      - name: Build Jekyll site
        run: |
          bundle exec jekyll build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  indexnow:
    needs: deploy
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Submit to IndexNow
        run: |
          SITE_URL="https://bestchromeextensions.com"
          KEY="c4ded4558ba249bbbd828bbfd67ebe80"
          HOST="bestchromeextensions.com"
          SITEMAP_URL="${SITE_URL}/sitemap.xml"
          MAX_URLS=10000
          BATCH_SIZE=100

          # Fetch sitemap and extract URLs
          curl -sf "$SITEMAP_URL" -o /tmp/sitemap.xml || { echo "::warning::Sitemap fetch failed"; exit 0; }
          grep -oP '(?<=<loc>)[^<]+' /tmp/sitemap.xml | head -${MAX_URLS} > /tmp/urls.txt
          URL_COUNT=$(wc -l < /tmp/urls.txt)

          if [ "$URL_COUNT" -eq 0 ]; then
            echo "No URLs found in sitemap"
            exit 0
          fi

          echo "Found $URL_COUNT URLs in sitemap"

          # Submit in batches of BATCH_SIZE (IndexNow best practice)
          BATCH_NUM=0
          TOTAL_SUBMITTED=0
          FAIL_COUNT=0
          while [ "$TOTAL_SUBMITTED" -lt "$URL_COUNT" ]; do
            BATCH_NUM=$((BATCH_NUM + 1))
            if [ "$BATCH_NUM" -gt 200 ]; then
              echo "Safety: max batch limit reached"
              break
            fi

            SKIP=$((TOTAL_SUBMITTED))
            tail -n +$((SKIP + 1)) /tmp/urls.txt | head -${BATCH_SIZE} > /tmp/batch.txt
            BATCH_COUNT=$(wc -l < /tmp/batch.txt)

            if [ "$BATCH_COUNT" -eq 0 ]; then
              break
            fi

            # Build JSON payload
            jq -R -s --arg host "$HOST" --arg key "$KEY" --arg keyloc "${SITE_URL}/${KEY}.txt" \
              '{host: $host, key: $key, keyLocation: $keyloc, urlList: (split("\n") | map(select(length > 0)))}' \
              /tmp/batch.txt > /tmp/indexnow-payload.json

            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "https://api.indexnow.org/indexnow" \
              -H "Content-Type: application/json" \
              -d @/tmp/indexnow-payload.json)

            TOTAL_SUBMITTED=$((TOTAL_SUBMITTED + BATCH_COUNT))

            if [ "$RESPONSE" = "200" ] || [ "$RESPONSE" = "202" ]; then
              echo "Batch $BATCH_NUM: $BATCH_COUNT URLs OK (HTTP $RESPONSE) [total: $TOTAL_SUBMITTED]"
            elif [ "$RESPONSE" = "429" ]; then
              echo "Batch $BATCH_NUM: rate limited (HTTP 429), waiting 5s"
              sleep 5
              continue
            else
              FAIL_COUNT=$((FAIL_COUNT + 1))
              echo "Batch $BATCH_NUM: FAILED $BATCH_COUNT URLs (HTTP $RESPONSE) [failures: $FAIL_COUNT]"
            fi

            # Rate limit: 1s between batches
            sleep 1
          done

          echo "Total: submitted $TOTAL_SUBMITTED of $URL_COUNT URLs in $BATCH_NUM batches, $FAIL_COUNT failures"
          if [ "$FAIL_COUNT" -gt 0 ]; then
            echo "::warning::IndexNow had $FAIL_COUNT failed batches"
          fi
