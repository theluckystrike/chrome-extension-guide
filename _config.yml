title: "Chrome Extension Guide by theluckystrike"
description: "500+ articles on Chrome extension development"
url: "https://theluckystrike.github.io/chrome-extension-guide"
baseurl: "/chrome-extension-guide"
google_analytics: "G-XXXXXXXXXX"
theme: minima
markdown: kramdown
highlighter: rouge
kramdown:
  syntax_highlighter: rouge

plugins:
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-feed

defaults:
  - scope:
      path: ""
    values:
      reading_time: true
  - scope:
      path: "_posts"
      type: "posts"
    values:
      layout: "post"
      sitemap: true
  - scope:
      path: "docs"
    values:
      sitemap: true

# Exclude non-content files from sitemap
exclude:
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - CONTRIBUTING.md
  - SEO-AUDIT.md
  - merge-all.sh
  - merge-all2.sh
  - examples/
  - vendor/

collections:
  docs:
    output: true
