title: "Chrome Extension Guide"
tagline: "Find Extensions Worth Installing — Reviews, Tutorials & Dev Guides"
description: "In-depth Chrome extension reviews, development tutorials, and curated recommendations. Find the best extensions for productivity, privacy, and web development with honest testing."
url: "https://bestchromeextensions.com"
baseurl: ""
google_analytics: "G-XXXXXXXXXX"
theme: minima
markdown: kramdown
highlighter: rouge
kramdown:
  syntax_highlighter: rouge

include:
  - google1a218412aeef37cf.html
  - _redirects

twitter:
  username: _alphashark_
  card: summary_large_image

author:
  name: Michael Lip
  url: https://github.com/theluckystrike

plugins:
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-feed

permalink: "/:year/:month/:day/:title/"

defaults:
  - scope:
      path: ""
    values:
      reading_time: true
  - scope:
      path: "_posts"
      type: "posts"
    values:
      layout: "post"
      sitemap: true
  - scope:
      path: "docs"
    values:
      sitemap: true

# Exclude non-content files from sitemap
exclude:
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - CONTRIBUTING.md
  - SEO-AUDIT.md
  - merge-all.sh
  - merge-all2.sh
  - examples/
  - vendor/
  - popup.html
  - popup.css
  - popup.js
  - content.js
  - manifest.json
  - marked.min.js
  - highlight.min.js
  - icons/

collections:
  docs:
    output: true
