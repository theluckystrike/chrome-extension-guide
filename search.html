---
layout: default
title: Search — Chrome Extension Guide
description: Search through 500+ articles on Chrome extension development
permalink: /search/
---

<style>
  .search-container {
    max-width: 800px;
    margin: 0 auto;
    padding: 2rem 1rem;
  }
  
  .search-header {
    text-align: center;
    margin-bottom: 2rem;
  }
  
  .search-header h1 {
    margin-bottom: 0.5rem;
    font-size: 2rem;
  }
  
  .search-input-wrapper {
    position: relative;
    margin-bottom: 2rem;
  }
  
  .search-input {
    width: 100%;
    padding: 1rem 1.5rem;
    font-size: 1.125rem;
    border: 2px solid #e5e7eb;
    border-radius: 12px;
    transition: border-color 0.2s, box-shadow 0.2s;
    box-sizing: border-box;
  }
  
  .search-input:focus {
    outline: none;
    border-color: #667eea;
    box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
  }
  
  .search-stats {
    text-align: center;
    color: #6b7280;
    margin-bottom: 1.5rem;
    font-size: 0.875rem;
  }
  
  .search-results {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }
  
  .search-result {
    padding: 1.25rem;
    background: white;
    border: 1px solid #e5e7eb;
    border-radius: 8px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  
  .search-result:hover {
    border-color: #667eea;
    box-shadow: 0 2px 8px rgba(102, 126, 234, 0.15);
  }
  
  .search-result a {
    text-decoration: none;
    color: inherit;
    display: block;
  }
  
  .search-result-title {
    font-size: 1.125rem;
    font-weight: 600;
    color: #1f2937;
    margin-bottom: 0.5rem;
  }
  
  .search-result-title:hover {
    color: #667eea;
  }
  
  .search-result-description {
    color: #4b5563;
    font-size: 0.875rem;
    line-height: 1.5;
    margin-bottom: 0.5rem;
  }
  
  .search-result-meta {
    display: flex;
    gap: 1rem;
    font-size: 0.75rem;
    color: #9ca3af;
  }
  
  .search-result-category {
    background: #f3f4f6;
    padding: 0.25rem 0.5rem;
    border-radius: 4px;
  }
  
  .no-results {
    text-align: center;
    padding: 3rem;
    color: #6b7280;
  }
  
  .no-results h3 {
    margin-bottom: 0.5rem;
    color: #374151;
  }
  
  .loading-spinner {
    display: none;
    text-align: center;
    padding: 2rem;
  }
  
  .loading-spinner.active {
    display: block;
  }
  
  .highlight {
    background-color: #fef3c7;
    padding: 0.125rem 0.25rem;
    border-radius: 2px;
  }
</style>

<div class="search-container">
  <div class="search-header">
    <h1>🔍 Search Articles</h1>
    <p>Find tutorials, API references, and guides for Chrome extension development</p>
  </div>
  
  <div class="search-input-wrapper">
    <input 
      type="text" 
      id="searchInput" 
      class="search-input" 
      placeholder="Search for topics (e.g., 'tabs API', 'popup', 'service worker')..."
      autocomplete="off"
    >
  </div>
  
  <div class="search-stats" id="searchStats"></div>
  
  <div class="loading-spinner" id="loadingSpinner">
    <p>Loading search index...</p>
  </div>
  
  <div class="search-results" id="searchResults"></div>
</div>

<script>
// Search index - populated from Jekyll
const searchIndex = [
  {% for doc in site.html_pages %}
    {% if doc.title and doc.url and doc.url != '/search/' and doc.url != '/' and doc.url != '/docs/' %}
    {
      title: {{ doc.title | jsonify }},
      url: {{ doc.url | relative_url | jsonify }},
      description: {{ doc.description | default: '' | jsonify }},
      content: {{ doc.content | strip_html | truncatewords: 50 | jsonify }},
      category: {% if doc.url contains '/permissions/' %}'Permissions'
        {% elsif doc.url contains '/api-reference/' %}'API Reference'
        {% elsif doc.url contains '/guides/' %}'Guides'
        {% elsif doc.url contains '/patterns/' %}'Patterns'
        {% elsif doc.url contains '/publishing/' %}'Publishing'
        {% elsif doc.url contains '/mv3/' %}'MV3'
        {% elsif doc.url contains '/tutorials/' %}'Tutorials'
        {% else %}'Documentation'{% endif %}
    }{% unless forloop.last %},{% endunless %}
    {% endif %}
  {% endfor %}
];

// Also search docs collection
{% if site.docs %}
  {% for doc in site.docs %}
    {% if doc.title and doc.url %}
    {
      title: {{ doc.title | jsonify }},
      url: {{ doc.url | relative_url | jsonify }},
      description: {{ doc.description | default: '' | jsonify }},
      content: {{ doc.content | strip_html | truncatewords: 50 | jsonify }},
      category: {% if doc.url contains '/permissions/' %}'Permissions'
        {% elsif doc.url contains '/api-reference/' %}'API Reference'
        {% elsif doc.url contains '/guides/' %}'Guides'
        {% elsif doc.url contains '/patterns/' %}'Patterns'
        {% elsif doc.url contains '/publishing/' %}'Publishing'
        {% elsif doc.url contains '/mv3/' %}'MV3'
        {% elsif doc.url contains '/tutorials/' %}'Tutorials'
        {% else %}'Documentation'{% endif %}
    }{% unless forloop.last %},{% endunless %}
    {% endif %}
  {% endfor %}
{% endif %}
];

// Simple search function
function search(query) {
  if (!query || query.length < 2) {
    return [];
  }
  
  const lowerQuery = query.toLowerCase();
  const terms = lowerQuery.split(/\s+/).filter(t => t.length > 0);
  
  return searchIndex
    .map(doc => {
      let score = 0;
      const titleLower = doc.title.toLowerCase();
      const descLower = (doc.description || '').toLowerCase();
      const contentLower = (doc.content || '').toLowerCase();
      
      // Title matches (highest weight)
      terms.forEach(term => {
        if (titleLower.includes(term)) {
          score += 10;
          // Exact title match
          if (titleLower === term) score += 5;
          // Title starts with term
          if (titleLower.startsWith(term)) score += 3;
        }
      });
      
      // Description matches (medium weight)
      terms.forEach(term => {
        if (descLower.includes(term)) {
          score += 5;
          if (descLower.startsWith(term)) score += 2;
        }
      });
      
      // Content matches (lower weight)
      terms.forEach(term => {
        if (contentLower.includes(term)) {
          score += 1;
        }
      });
      
      return { ...doc, score };
    })
    .filter(doc => doc.score > 0)
    .sort((a, b) => b.score - a.score);
}

// Highlight matching terms
function highlightMatch(text, query) {
  if (!query || query.length < 2) return text;
  
  const terms = query.toLowerCase().split(/\s+/).filter(t => t.length > 0);
  let result = text;
  
  terms.forEach(term => {
    const regex = new RegExp(`(${term})`, 'gi');
    result = result.replace(regex, '<span class="highlight">$1</span>');
  });
  
  return result;
}

// Render search results
function renderResults(results, query) {
  const resultsContainer = document.getElementById('searchResults');
  const statsContainer = document.getElementById('searchStats');
  
  if (results.length === 0) {
    resultsContainer.innerHTML = `
      <div class="no-results">
        <h3>No results found</h3>
        <p>Try different keywords or check your spelling</p>
      </div>
    `;
    statsContainer.textContent = '';
    return;
  }
  
  statsContainer.textContent = `Found ${results.length} article${results.length !== 1 ? 's' : ''}`;
  
  resultsContainer.innerHTML = results.map(doc => `
    <div class="search-result">
      <a href="${doc.url}">
        <div class="search-result-title">${highlightMatch(doc.title, query)}</div>
        <div class="search-result-description">${doc.description || 'No description available'}</div>
        <div class="search-result-meta">
          <span class="search-result-category">${doc.category}</span>
        </div>
      </a>
    </div>
  `).join('');
}

// Debounce function
function debounce(func, wait) {
  let timeout;
  return function executedFunction(...args) {
    const later = () => {
      clearTimeout(timeout);
      func(...args);
    };
    clearTimeout(timeout);
    timeout = setTimeout(later, wait);
  };
}

// Initialize search
document.addEventListener('DOMContentLoaded', function() {
  const searchInput = document.getElementById('searchInput');
  const loadingSpinner = document.getElementById('loadingSpinner');
  
  // Hide loading spinner (index is inline)
  loadingSpinner.classList.remove('active');
  
  // Show all articles initially (sorted by title)
  const initialResults = [...searchIndex].sort((a, b) => a.title.localeCompare(b.title));
  renderResults(initialResults, '');
  
  // Handle search input
  const handleSearch = debounce(function(e) {
    const query = e.target.value.trim();
    const results = search(query);
    renderResults(results, query);
  }, 200);
  
  searchInput.addEventListener('input', handleSearch);
  
  // Focus search on page load
  searchInput.focus();
});
</script>
