<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>404 — Page Not Found</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,
        "Helvetica Neue",Arial,sans-serif;
      display:flex;align-items:center;justify-content:center;
      min-height:100vh;background:#f8f9fa;color:#333;
      line-height:1.6;
    }
    .container{text-align:center;padding:2rem;max-width:480px}
    .error-code{
      font-size:8rem;font-weight:800;color:#dee2e6;
      line-height:1;margin-bottom:.25rem;
      letter-spacing:-.05em;
    }
    h2{font-size:1.5rem;margin-bottom:.75rem;color:#495057;font-weight:600}
    p{color:#868e96;margin-bottom:1.5rem;font-size:.95rem}
    .home-link{
      display:inline-block;padding:.65rem 1.75rem;
      background:#228be6;color:#fff;text-decoration:none;
      border-radius:6px;font-size:.95rem;font-weight:500;
      transition:background .15s ease;
    }
    .home-link:hover{background:#1c7ed6}
    .home-link:active{background:#1971c2}
  </style>
</head>
<body>
  <div class="container">
    <div class="error-code">404</div>
    <h2>Page Not Found</h2>
    <p>The page you are looking for does not exist or has been moved.</p>
    <a href="/" class="home-link">Back to Homepage</a>
  </div>
</body>
</html>
